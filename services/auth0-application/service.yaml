id: auth0-application
name: Auth0 Application
category: identity
status: live
classification_min: poc
classification_max: critical-path
description: >-
  An Auth0 application (client) in an existing tenant — the first non-AWS,
  non-inference service module, provisioned through the universal terraform
  connector with no Asgard code. The generated client_secret is routed to the
  secret store; only a reference is recorded. A project-dedicated Auth0 *tenant*
  is not API/Terraform-creatable and is deferred.
auto_approvable: true
required_fields: [name]
provisioner:
  connector: terraform
  config:
    module: ./modules/auth0/application
secret_outputs: [client_secret]
cost:
  model: free
  estimated_monthly_usd: 0.0
  source:
    type: none
tags: [identity, auth0]
documentation: services/auth0-application/README.md
