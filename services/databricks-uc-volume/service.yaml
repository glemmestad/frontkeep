id: databricks-uc-volume
name: Unity Catalog Volume
category: storage
status: live
classification_min: poc
classification_max: critical-path
description: >-
  A Unity Catalog schema + managed volume — a governed namespace and storage for a
  project's data and artifacts under an existing catalog. Provisioned through
  Asgard's terraform connector + the Databricks provider. Cheap and self-service
  (auto-approvable); the project tag is recorded on the schema for attribution.
auto_approvable: true
required_fields: [name, catalog_name]
provisioner:
  connector: terraform
  config:
    module: ./modules/databricks/uc-volume
    cloud: databricks
cost:
  model: free
  estimated_monthly_usd: 0.0
  source:
    type: none
tags: [storage, databricks, unity-catalog]
documentation: services/databricks-uc-volume/README.md
