id: databricks-job
name: Databricks Workflow Job
category: compute
status: live
classification_min: poc
classification_max: critical-path
description: >-
  A Databricks Workflows job that runs a notebook task on serverless compute,
  optionally on a schedule. Provisioned through Asgard's terraform connector +
  the Databricks provider — gated, tier-classified, project-tagged, and audited.
  Always requires human approval (a scheduled job is recurring compute spend).
auto_approvable: false
required_fields: [name, notebook_path]
provisioner:
  connector: terraform
  config:
    module: ./modules/databricks/job
    cloud: databricks
cost:
  model: usage
  estimated_monthly_usd: 50.0
  source:
    type: databricks-billing
tags: [compute, databricks, workflows, job]
documentation: services/databricks-job/README.md
