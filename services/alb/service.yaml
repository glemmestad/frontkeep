id: alb
name: Application Load Balancer
category: networking
status: live
classification_min: poc
classification_max: critical-path
description: >-
  A standalone Application Load Balancer for shared or advanced composition,
  where several services register target groups against one ALB rather than each
  ecs-service owning its own. Takes an existing VPC; optional HTTPS via an ACM
  certificate.
auto_approvable: true
long_running: true
required_fields: [name]
provisioner:
  connector: terraform
  config:
    module: aws/alb
    cloud: aws
    # See ecs-service: spec ids win, else these fleet defaults, else the account
    # default VPC.
    defaults:
      vpc_id: ${FRONTKEEP_DEFAULT_VPC_ID}
      subnet_ids: ${FRONTKEEP_DEFAULT_SUBNET_IDS:csv}
cost:
  model: usage
  estimated_monthly_usd: 20.0
  source:
    type: aws-cost-explorer
tags: [networking, aws, alb]
documentation: services/alb/README.md
