name: Deploy marketing site

# Auto-deploys asgard.build whenever the site OR the docs it serves change.
# Docs live in docs/docs/**; the site's prebuild (website/scripts/sync-docs.mjs)
# copies them in, so a docs edit redeploys with the fresh content. No humans.
on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/docs/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

concurrency:
  group: deploy-marketing-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Build (prebuild syncs docs/docs into the site)
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
