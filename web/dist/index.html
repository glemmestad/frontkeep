          };
        };
        const evEdit = root().querySelector('#ev-edit');
        if (evEdit) evEdit.onclick = () => {
          document.getElementById('p-evidence').innerHTML = evidenceForm(p);
          evEdit.disabled = true;
          document.getElementById('ev-cancel').onclick = () => { document.getElementById('p-evidence').innerHTML = evidenceView(p); evEdit.disabled = false; };
          document.getElementById('ev-save').onclick = async () => {
            const body = {};
            document.querySelectorAll('#p-evidence [data-ev]').forEach(elm => {
              const f = EVIDENCE_FIELDS.find(x => x.k === elm.dataset.ev);
              body[elm.dataset.ev] = f.list ? elm.value.split(',').map(s => s.trim()).filter(Boolean) : elm.value.trim();
            });
            const out = document.getElementById('ev-out');
            out.innerHTML = '';
            try { await api(`/api/projects/${enc(id)}`, {method:'PATCH', headers:{'content-type':'application/json'}, body:JSON.stringify(body)}); showDetail(id); }
            catch (e) { out.innerHTML = `<span class="err">${esc(e.message)}</span>`; }
          };
        };
        // One promotion path, reused by the promote button and the flagged re-run:
        // a clean Light result auto-approves (we fulfil it); findings come back
        // flagged; everything else parks for a human.
        async function doPromote(target, outId, btn) {
          const out = document.getElementById(outId); if (out) out.innerHTML = '';
          if (btn) btn.disabled = true;
          try {
            const req = await api(`/api/projects/${enc(id)}/promotion`, {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({target})});
            if (req.state === 'approved') {
              await api(`/api/requests/${enc(req.id)}/fulfill`, {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({actor:'user:default/ui'})});
              if (out) out.innerHTML = `<span class="ok">Promoted to ${esc(target)}.</span>`;
            } else if (req.state === 'flagged') {
              if (out) out.innerHTML = `<span class="muted" style="font-size:13px">Still needs changes — ${((req.payload||{}).review_findings||[]).length} finding(s) remain.</span>`;
            } else {
              if (out) out.innerHTML = `<span class="muted" style="font-size:13px">Submitted for review (request <code>${esc(req.id)}</code>${req.approver?`, approver ${esc(req.approver)}`:''}).</span>`;
            }
            setTimeout(() => showDetail(id), 900);
          } catch (e) { if (out) out.innerHTML = `<span class="err">${esc(e.message)}</span>`; if (btn) btn.disabled = false; }
        }
        const promoteBtn = root().querySelector('#promote-btn');
        if (promoteBtn && checklist && checklist.next_tier) promoteBtn.onclick = () => doPromote(checklist.next_tier, 'promote-out', promoteBtn);
        const rerunBtn = root().querySelector('#rerun-btn');
        if (rerunBtn && flagged) rerunBtn.onclick = () => doPromote((flagged.payload||{}).target_classification || (checklist && checklist.next_tier), 'flag-out', rerunBtn);
        const escalateBtn = root().querySelector('#escalate-btn');
        if (escalateBtn && flagged) escalateBtn.onclick = async () => {
          const out = document.getElementById('flag-out'); out.innerHTML = ''; escalateBtn.disabled = true;
          try { await api(`/api/requests/${enc(flagged.id)}/escalate`, {method:'POST'}); showDetail(id); }
          catch (e) { out.innerHTML = `<span class="err">${esc(e.message)}</span>`; escalateBtn.disabled = false; }
        };
        const authorizeBtn = root().querySelector('#authorize-btn');
        if (authorizeBtn && flagged) authorizeBtn.onclick = async () => {
          const out = document.getElementById('flag-out'); out.innerHTML = ''; authorizeBtn.disabled = true;
          try {
            await api(`/api/requests/${enc(flagged.id)}/approve`, {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({actor:'user:default/ui', reason:'admin override'})});
            await api(`/api/requests/${enc(flagged.id)}/fulfill`, {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({actor:'user:default/ui'})});
            showDetail(id);
          } catch (e) { out.innerHTML = `<span class="err">${esc(e.message)}</span>`; authorizeBtn.disabled = false; }
        };
        const demoteBtn = root().querySelector('#demote-btn');
        if (demoteBtn) demoteBtn.onclick = async () => {
          const out = document.getElementById('demote-out'); out.innerHTML = '';
          const target = document.getElementById('demote-target').value;
          const reason = document.getElementById('demote-reason').value.trim();
          if (!reason) { out.innerHTML = `<span class="err">A reason is required.</span>`; return; }
          demoteBtn.disabled = true;
          try { await api(`/api/projects/${enc(id)}/demote`, {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({target, reason})}); showDetail(id); }
          catch (e) { out.innerHTML = `<span class="err">${esc(e.message)}</span>`; demoteBtn.disabled = false; }
        };
        const extendBtn = root().querySelector('#extend-btn');
        if (extendBtn) extendBtn.onclick = async () => {
          const out = document.getElementById('extend-out'); out.innerHTML = '';
          extendBtn.disabled = true;
          try {
            const r = await api(`/api/projects/${enc(id)}/extend`, {method:'POST'});
            if (r.outcome === 'extended') { showDetail(id); }
            else { out.innerHTML = `<span class="muted" style="font-size:13px">Automatic extensions used up — submitted for review (request <code>${esc(r.request.id)}</code>).</span>`; setTimeout(() => showDetail(id), 1200); }
          } catch (e) { out.innerHTML = `<span class="err">${esc(e.message)}</span>`; extendBtn.disabled = false; }
        };
      }

      async function doAction(id, kind) {
        const opts = {
          kill: { title:'Kill this project?', message:'Disables the project key immediately and suspends its billable resources (compute stops; storage remains). Reversible via un-kill.', confirmLabel:'Kill project' },
          unkill: { title:'Un-kill this project?', message:'Re-enables the project key and resumes its suspended resources.', confirmLabel:'Un-kill project' },
          decommission: { title:'Decommission this project?', message:'Permanently destroys every provisioned resource including data (images, volumes, databases) and retires the project. This cannot be undone.', confirmLabel:'Decommission' },
        }[kind];
        if (!await confirmAction(opts)) return;
        // Each lifecycle transition commits before/after its connector call, so poll
        // the resource list while the (synchronous) action runs to show live state.
        let polling = true;
        const tick = async () => {
          if (!polling) return;
          try { const rs = await api(`/api/projects/${enc(id)}/resources`); const slot = document.getElementById('p-res'); if (slot) { slot.innerHTML = resourceTable(rs); wireResources(id); } } catch {}
          if (polling) setTimeout(tick, 2000);
        };
        setTimeout(tick, 600);
        const req = kind === 'decommission'
          ? api(`/api/projects/${enc(id)}/decommission`, {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({reason:'decommissioned via ui'})})
          : api(`/api/projects/${enc(id)}/${kind}`, {method:'POST'});
        try { await req; } catch (e) { polling = false; alert(e.message); return; }
        polling = false;
        delete seriesCache[id];
        showDetail(id);
      }

      showList();
      if (focusProject) { const id = focusProject; focusProject = null; showDetail(id); }
    }

    // ---------- Governance (portfolio metrics, WS4) ----------
    function govValue(m) {
      if (!m.measurable) return m.value == null ? 'n/a' : '—';
      if (m.unit === 'days') return Number(m.value).toFixed(1) + 'd';
      return String(Math.round(m.value));
    }
    function govStatus(m) {
      if (!m.measurable) return { cls: '', txt: 'no data source yet' };
      const v = Number(m.value || 0);
      if (m.unit === 'days') return { cls: 'teal', txt: 'tracked' };
      if (m.target === '0') return v === 0 ? { cls: 'green', txt: 'on target' } : { cls: 'red', txt: 'off target' };
      return v > 0 ? { cls: 'amber', txt: 'watch' } : { cls: 'green', txt: 'clear' };
    }

      root().innerHTML = `
        <div class="row" style="gap:18px;margin-bottom:14px;flex-wrap:wrap">
          <span class="muted" style="font-size:12px">as of <code>${esc((m.as_of||'').slice(0,10))}</code></span>
          <span class="muted" style="font-size:12px"><strong class="num">${m.total_projects}</strong> projects</span>
          <span class="muted" style="font-size:12px"><strong class="num">${m.operational_projects}</strong> operational</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">${cards}</div>`;

      root().querySelectorAll('.g-link').forEach(b => b.onclick = () => { focusProject = b.dataset.id; go('projects'); });
    }

    async function renderAudit() {
      const v = document.getElementById('view');
      v.innerHTML = `<h1 class="pagehead">Audit</h1>
        <p class="pagesub">Append-only record of every governed action.</p>
        <div class="row" style="margin-bottom:16px">
        <input id="trace" placeholder="trace id (optional)" style="min-width:260px"/>
        <input id="ent" placeholder="entity ref (optional)" style="min-width:240px"/>
        <button class="act" id="go">Query</button></div>
        <div id="rows">${loading('Loading audit log…')}</div>`;
      const run = async () => {
        const out = document.getElementById('rows');
        out.innerHTML = loading('Loading audit log…');
        const params = new URLSearchParams();
        const tr = document.getElementById('trace').value.trim(); if (tr) params.set('trace', tr);
        const en = document.getElementById('ent').value.trim(); if (en) params.set('entity', en);
        try {
          const audits = await api('/api/audit?' + params);
          if (!audits.length) { out.innerHTML = empty('No audit entries match.'); return; }
          const rows = audits.map(a => `<tr>
            <td class="muted num" style="white-space:nowrap">${esc(a.ts)}</td>
            <td><code>${esc(a.actor)}</code></td>
            <td><code>${esc(a.action)}</code></td>
            <td>${pill(a.outcome)}</td>
            <td class="muted">${a.entity_ref?`<code>${esc(a.entity_ref)}</code>`:''}</td>
            <td class="muted">${a.trace_id?`<code>${esc(a.trace_id)}</code>`:''}</td></tr>`).join('');
          out.innerHTML = `<div class="tablewrap"><table><thead><tr>
            <th>time</th><th>actor</th><th>action</th><th>outcome</th><th>entity</th><th>trace</th>
            </tr></thead><tbody>${rows}</tbody></table></div>`;
        } catch (e) { out.innerHTML = errBanner(e); }
      };
      document.getElementById('go').onclick = run; run();
    }

    async function renderApprovals() {
      const v = document.getElementById('view');
      let view = 'requested';
      const FACETS = [['requested', 'Pending'], ['approved', 'Awaiting provision'], ['', 'All']];
      const facet = (k, l) => `<button data-af="${k}" style="padding:4px 11px;border-radius:999px;border:1px solid ${view === k ? 'var(--teal)' : 'var(--line)'};background:${view === k ? 'var(--teal)' : 'transparent'};color:${view === k ? '#04201d' : 'var(--fg)'};cursor:pointer;font-size:12px;font-weight:${view === k ? 700 : 400}">${esc(l)}</button>`;
      const actor = () => meEmail || 'admin';
      v.innerHTML = `<h1 class="pagehead">Approvals</h1>
        <p class="pagesub">The exception queue. In-policy requests (within budget, at an auto-approvable classification) provision without stopping here — only the residue lands: over budget, above the self-service tier, or credential-minting. Approve and the resource joins the deployment queue automatically.</p>
        <div class="row" id="af" style="gap:6px;margin-bottom:14px;flex-wrap:wrap">${FACETS.map(([k, l]) => facet(k, l)).join('')}</div>
        <div id="rows">${loading('Loading requests…')}</div>`;
      const wireFacets = () => v.querySelectorAll('[data-af]').forEach(b => b.onclick = () => { view = b.dataset.af; v.querySelector('#af').innerHTML = FACETS.map(([k, l]) => facet(k, l)).join(''); wireFacets(); run(); });
      async function run() {
        const out = document.getElementById('rows');
        out.innerHTML = loading('Loading requests…');
        try {
          const reqs = await api('/api/requests' + (view ? `?state=${view}` : ''));
          if (!reqs.length) { out.innerHTML = empty(view === 'requested' ? 'Nothing waiting on a human. Self-service is doing its job.' : 'No requests in this state.'); return; }
          out.innerHTML = reqs.map(r => {
            const p = r.payload || {};
            const meta = [p.resource_type && `type <code>${esc(p.resource_type)}</code>`, p.cloud && `cloud <code>${esc(p.cloud)}</code>`, p.provision_tier && `tier <code>${esc(p.provision_tier)}</code>`].filter(Boolean).join(' · ');
            const acts = r.state === 'requested'
              ? `<button class="act" data-approve="${esc(r.id)}">Approve</button><button class="act" data-reject="${esc(r.id)}" style="background:var(--chip);color:var(--fg);border:1px solid var(--line2)">Reject</button>`
              : r.state === 'approved'
                ? (r.kind.startsWith('provision')
                    ? `<span class="muted" style="font-size:12px">Deploying…</span>`
                    : `<button class="act" data-fulfill="${esc(r.id)}">Apply</button>`)
                : '';
            return `<div class="card" style="margin-bottom:10px">
              <div class="row" style="justify-content:space-between;align-items:flex-start">
                <div><div class="ttl">${esc(r.subject)} ${pill(r.state)}</div>
                  <div class="muted" style="font-size:12px;margin-top:4px">${esc(r.kind)}${meta ? ' · ' + meta : ''}</div>
                  <div class="muted" style="font-size:11px;margin-top:4px">by <code>${esc(r.requester)}</code> · ${esc((r.created_at || '').slice(0, 16).replace('T', ' '))}${r.sla_due_at ? ` · SLA due ${esc(r.sla_due_at.slice(0, 10))}` : ''}${r.approver ? ` · by ${esc(r.approver)}` : ''}</div>
                  ${r.reason ? `<div class="muted" style="font-size:12px;margin-top:4px">${esc(r.reason)}</div>` : ''}</div>
                <div class="row" style="gap:6px">${acts}</div>
              </div>
              <span class="muted" style="font-size:11px"><code>${esc(r.id)}</code></span></div>`;
          }).join('');
          const act = async (id, path, body) => { try { await api(`/api/requests/${encodeURIComponent(id)}/${path}`, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) }); run(); } catch (e) { alert(e.message); } };
          out.querySelectorAll('[data-approve]').forEach(b => b.onclick = () => act(b.dataset.approve, 'approve', { actor: actor() }));
          out.querySelectorAll('[data-fulfill]').forEach(b => b.onclick = () => act(b.dataset.fulfill, 'fulfill', { actor: actor() }));
          out.querySelectorAll('[data-reject]').forEach(b => b.onclick = async () => {
            if (!await confirmAction({ title: 'Reject request', message: 'Deny this request? The requester will have to resubmit.', confirmLabel: 'Reject' })) return;
            act(b.dataset.reject, 'reject', { actor: actor() });
          });
        } catch (e) { out.innerHTML = errBanner(e); }
      }
      wireFacets(); run();
    }

    function renderAbout() {
      document.getElementById('view').innerHTML = `<h1 class="pagehead">About</h1>
      <p class="pagesub">An open-source governance control plane for AI &amp; agent development.</p>
      <div class="card">
        <p style="margin-top:0">${SYS_NAME} pairs a governed catalog with a model gateway — budgets, policy, guardrails, kill switch, and audit — alongside evals as PR gates, a request→approval workflow, and an isolated runtime.</p>
        <p class="muted" style="margin-bottom:0">Ships as a single embedded binary. REST at <code>/api/*</code>, GraphQL at <code>/graphql</code>, and MCP at <code>/mcp</code> (Streamable HTTP) plus stdio.</p>
      </div>
      <div class="grid2">
        <div class="pcard"><div class="pn">Catalog</div><p class="muted" style="font-size:13px;margin-bottom:0">Discoverable entities with lifecycle and ownership.</p></div>
        <div class="pcard"><div class="pn">Gateway</div><p class="muted" style="font-size:13px;margin-bottom:0">Budget-aware model access with per-project virtual keys.</p></div>
        <div class="pcard"><div class="pn">Cost</div><p class="muted" style="font-size:13px;margin-bottom:0">Rollups, forecasts, anomalies, and attribution.</p></div>
        <div class="pcard"><div class="pn">Audit</div><p class="muted" style="font-size:13px;margin-bottom:0">Append-only trail of every governed action.</p></div>
      </div>`;
    }

    // ---------- Auth gate (local users + optional SSO) ----------
    async function showLogin() {
      let cfg = { local: true, oidc: false };
      try { cfg = await api('/api/auth/config'); } catch {}
      APP_CFG = cfg;
      document.getElementById('nav').innerHTML = '';
      document.getElementById('aside').style.display = 'none';
      document.getElementById('view').className = 'wrap';
      const localOn = cfg.local !== false;

      // SSO-only deployment: skip the click and bounce straight to the IdP. Guard
      // against a loop — if a rejected session cookie sends us right back, we'd
      // redirect forever, so don't auto-redirect twice within 10s; fall through to
      // a manual button instead. `?local=1` suppresses the auto-redirect for debug.
      const debugLocal = new URLSearchParams(location.search).has('local');
      let bounced = false;
      if (cfg.oidc && !localOn && !debugLocal) {
        const last = Number(sessionStorage.getItem('asg_sso_ts') || 0);
        if (Date.now() - last > 10000) {
          sessionStorage.setItem('asg_sso_ts', String(Date.now()));
          location.href = '/api/auth/oidc/login';
          return;
        }
        bounced = true;
      }

      const sso = cfg.oidc
        ? `<button class="act" id="sso" style="margin-top:10px;width:100%">Sign in with SSO</button>`
        : '';
      const form = localOn ? `<form id="loginf">
          <input id="u" placeholder="username" autocomplete="username" style="width:100%;margin:6px 0" />
          <input id="p" type="password" placeholder="password" autocomplete="current-password" style="width:100%;margin:6px 0" />
          <button class="act" type="submit" style="width:100%;margin-top:6px">Sign in</button>
        </form>` : '';
      const note = (!localOn && cfg.oidc)
        ? `<p class="muted" style="margin:6px 0 0;font-size:12px">Single sign-on is required for this deployment.</p>`
        : '';
      document.getElementById('view').innerHTML = `<div class="card" style="max-width:340px;margin:96px auto">
        <div class="row" style="gap:10px;margin-bottom:14px"><span class="logo">F</span><span class="brand">Frontkeep</span></div>
        ${form}
        ${sso}
        ${note}
        <p class="err" id="loginerr" style="min-height:1em;margin-bottom:0"></p>
      </div>`;
      applyBranding(cfg.system_name);
      if (bounced) document.getElementById('loginerr').textContent = "Sign-in didn't complete — try again.";
      if (cfg.oidc) document.getElementById('sso').onclick = () => {
        sessionStorage.setItem('asg_sso_ts', String(Date.now()));
        location.href = '/api/auth/oidc/login';
      };
      const lf = document.getElementById('loginf');
      if (lf) lf.onsubmit = async (e) => {
        e.preventDefault();
        try {
          await api('/api/auth/login', { method: 'POST', headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ username: document.getElementById('u').value, password: document.getElementById('p').value }) });
          boot();
        } catch (err) { document.getElementById('loginerr').textContent = (err && err.message) || 'sign-in failed'; }
      };
    }

    // boot: require a session, then preload per-project series so sparklines
    // render on first paint. Falls back to the sign-in view when unauthenticated.
    function applyBranding(name) {
      name = (name && String(name).trim()) || 'Frontkeep';
      SYS_NAME = name;
      document.title = name;
      document.querySelectorAll('.brand').forEach(e => e.textContent = name);
      document.querySelectorAll('.logo').forEach(e => e.textContent = name[0].toUpperCase());
    }
    async function boot() {
      try { APP_CFG = await api('/api/auth/config'); applyBranding(APP_CFG.system_name); } catch {}
      let me;
      try { me = await api('/api/auth/me'); }
      catch { return showLogin(); }
      sessionStorage.removeItem('asg_sso_ts');
      currentRole = (me && me.role) || 'member';
      meEmail = (me && me.email) || '';
      active = 'start';
      document.getElementById('aside').style.display = '';
      const avatar = document.getElementById('avatar');
      if (avatar) {
        const who = (me && (me.display_name || me.username)) || 'U';
        avatar.textContent = who[0].toUpperCase();
        avatar.style.cursor = 'pointer'; avatar.title = `${who} · ${currentRole} — sign out`;
        avatar.onclick = async () => { try { await api('/api/auth/logout', { method: 'POST' }); } catch {} boot(); };
      }
      renderNav();
      try { const projects = await api('/api/projects'); await loadSeries(projects.map(p=>p.project_id)); } catch {}
      document.getElementById('view').className = tabs[active].full ? 'full' : 'wrap';
      tabs[active].render();
    }
    applyTheme((() => { try { return localStorage.getItem('frontkeep-theme') || 'light'; } catch { return 'light'; } })());
    const _tb = document.getElementById('themebtn');
    if (_tb) { _tb.textContent = theme() === 'light' ? '☀' : '☾'; _tb.onclick = toggleTheme; }
    boot();
  </script>
</body>
