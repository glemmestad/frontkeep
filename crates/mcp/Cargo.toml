rmcp = { version = "1", features = [
    "server",
    "macros",
    "transport-streamable-http-server",
    "transport-io",
] }
schemars = "1"
http = "1"

[dev-dependencies]
asgard-storage.workspace = true
asgard-policy.workspace = true
tokio.workspace = true
