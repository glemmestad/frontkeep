asgard-gateway.workspace = true
asgard-identity.workspace = true
asgard-registry = { workspace = true, features = ["schemars"] }
asgard-provision.workspace = true
asgard-workflow.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true
