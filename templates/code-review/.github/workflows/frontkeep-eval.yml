name: frontkeep-eval

on: [pull_request]

# Evals are CI for non-determinism: this gate runs the agent's eval suite on each
# PR, posts a scored verdict as a comment, and blocks merge if the suite fails.
jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Frontkeep eval gate
        env:
          FRONTKEEP_URL: ${{ secrets.FRONTKEEP_URL }}
          FRONTKEEP_TOKEN: ${{ secrets.FRONTKEEP_TOKEN }}
        run: |
          frontkeep eval run \
            --suite eval.yaml \
            --cases cases.json \
            --comment \
            --gate
